plugins:
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - ".git/**/*"
    - "docs/**/*"
    - "gemfiles/*"
    - "lib/rocket_job/cli.rb"
    - "rocketjob/lib/rocket_job/railtie.rb"

#
# RuboCop built-in settings.
#   For documentation on all settings see: https://docs.rubocop.org/en/stable
#

# Trailing periods.
Layout/DotPosition:
  EnforcedStyle: trailing

# Turn on auto-correction of equals alignment.
Layout/EndAlignment:
  AutoCorrect: true

# Prevent accidental windows line endings
Layout/EndOfLine:
  EnforcedStyle: lf

# Use a table layout for hashes
Layout/HashAlignment:
  EnforcedHashRocketStyle: table
  EnforcedColonStyle: table

# Soften limits
Layout/LineLength:
  Max: 128
  Exclude:
    - "**/test/**/*"

# Match existing layout
Layout/SpaceInsideHashLiteralBraces:
  EnforcedStyle: no_space

# Rocket Job uses Exception to ensure all exceptions are captured.
Lint/RescueException:
  Enabled: false

# TODO: Soften Limits for phase 1 only
Metrics/AbcSize:
  Max: 40

# Support long block lengths for tests
Metrics/BlockLength:
  Exclude:
    - "test/**/*"
    - "**/*/cli.rb"
  AllowedMethods:
    - "aasm"
    - "included"

# Soften limits
Metrics/ClassLength:
  Max: 250
  Exclude:
    - "test/**/*"

# TODO: Soften Limits for phase 1 only
Metrics/CyclomaticComplexity:
  Max: 15

# Soften limits
Metrics/MethodLength:
  Max: 50

# Soften limits
Metrics/ModuleLength:
  Max: 250

Metrics/ParameterLists:
  CountKeywordArgs: false

# TODO: Soften Limits for phase 1 only
Metrics/PerceivedComplexity:
  Max: 21

# Action methods such as #rocket_job_work and #fail_on_exception! return a
# boolean but are commands, not predicates, and are part of the public API.
Naming/PredicateMethod:
  Enabled: false

# get_ prefixed reader retained for backward compatibility.
Naming/AccessorMethodName:
  Exclude:
    - "lib/rocket_job/dirmon_entry.rb"

# Psych dispatches to visitor methods named after the class (IOStreams::Path
# => visit_IOStreams_Path), so the CamelCase name is required.
Naming/MethodName:
  Exclude:
    - "lib/rocket_job/extensions/psych/yaml_tree.rb"

# Initialization Vector abbreviation
Naming/MethodParameterName:
  AllowedNames: [ "iv", "_", "io", "ap", "id" ]

# Does not allow Symbols to load
Security/YAMLLoad:
  AutoCorrect: false

# Needed for testing DateTime
Style/DateTime:
  Exclude: [ "test/**/*" ]

# TODO: Soften Limits for phase 1 only
Style/Documentation:
  Enabled: false

# One line methods
Style/EmptyMethod:
  EnforcedStyle: expanded

# Ruby 3 compatibility feature
Style/FrozenStringLiteralComment:
  Enabled: false

Style/NumericPredicate:
  AutoCorrect: true

# Incorrectly changes job.fail to job.raise
Style/SignalException:
  Enabled: false

# Since English may not be loaded, cannot force its use.
Style/SpecialGlobalVars:
  Enabled: false

# Just painful to replace all these.
Style/StringConcatenation:
  Enabled: false

# Make it easier for developers to move between Elixir and Ruby.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Boolean arguments such as re_raise_exceptions and save_before are part of the
# public worker/slice API; switching them to keyword args would break callers.
Style/OptionalBooleanParameter:
  Enabled: false

#
# Minitest plugin: relax checks that conflict with this suite's conventions.
#

# Test granularity is intentional; grouping related assertions in one `it` block
# keeps the specs readable.
Minitest/MultipleAssertions:
  Enabled: false

# This suite passes a lambda as the failure message (assert value, -> { debug }),
# which the cop mistakes for an assert_equal expected argument.
Minitest/AssertWithExpectedArgument:
  Enabled: false
